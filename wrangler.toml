name = "emailtem"
# name = "mail-exhibit"
main = "src/server.js"
compatibility_date = "2024-01-01"

# D1 数据库绑定
[[d1_databases]]
binding = "TEMP_MAIL_DB"
database_name = "maill_free_db" #你的d1数据库名称
database_id = "dc5d4853-1bb9-4f0f-9443-f7afa8d725ab" # 你的database_id
# ====== 环境变量 ======
# 重要：所有环境变量必须在 Cloudflare Dashboard → Workers → Settings → Variables and Secrets 中配置
# 不要在此文件中添加 [vars] 节，否则每次部署会覆盖/清空 Dashboard 中设定的值！
#
# 必需的变量：
#   ADMIN_PASSWORD  - 管理员密码
#   JWT_TOKEN       - JWT 签名密钥
#   MAIL_DOMAIN     - 邮件域名 (如 readygo.us.ci)
#
# 可选的变量：
#   SITE_NAME       - 站点名称 (默认 "Leon's 临时邮件")
#   FOOTER_TEXT     - 页脚文字 (默认 "简约而不简单")
#   REPO_URL        - GitHub 仓库地址 (留空则隐藏按钮)
#   GUEST_PASSWORD  - 访客密码 (留空则禁用访客登录)
#   FORWARD_RULES   - 转发规则 JSON


# 静态资源目录（Workers + Assets）
[assets]
directory = "public"
# 显式指定绑定名，确保在 Worker 中通过 env.ASSETS 可用
binding = "ASSETS"
# 禁用 pretty URLs：阻止 ASSETS 把 .html 文件 307 重定向到无后缀路径
# 否则 env.ASSETS.fetch('/html/admin.html') 会返回 307 空 body 而不是 HTML 内容
html_handling = "none"
not_found_handling = "none"


# R2 存储桶绑定（用于保存完整 EML 内容）
[[r2_buckets]]
binding = "MAIL_EML"
bucket_name = "mail-eml"

# wrangler.toml (wrangler v3.88.0^) 日志服务
# [observability.logs]
# enabled = true



